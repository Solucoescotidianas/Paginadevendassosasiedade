<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qual é o nível da sua ansiedade? — SOS Mente Acelerada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f8;
    --white: #ffffff;
    --purple: #7b5ea7;
    --purple2: #9c4de0;
    --lilac: #d6c9ee;
    --soft: #ece7f6;
    --brown: #8b6b4a;
    --text: #3d3050;
    --muted: #8e84a3;
    --shadow: rgba(123,94,167,0.13);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* Background blobs */
  body::before, body::after {
    content:''; position:fixed; border-radius:50%;
    filter:blur(70px); pointer-events:none; z-index:0; opacity:0.3;
  }
  body::before { width:400px;height:400px;background:#d6c9ee;top:-100px;right:-80px; }
  body::after  { width:350px;height:350px;background:#f0e6d3;bottom:0;left:-100px; }

  .quiz-container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .quiz-header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--white); border: 1px solid var(--lilac);
    border-radius: 100px; padding: 6px 16px;
    font-size: 12px; font-weight: 700; color: var(--purple);
    letter-spacing: 0.06em; margin-bottom: 20px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .quiz-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 34px);
    font-weight: 700; color: var(--purple); line-height: 1.2;
    margin-bottom: 10px;
  }
  .quiz-header h1 em { font-style: italic; color: var(--brown); }
  .quiz-header p { font-size: 15px; color: var(--muted); }

  /* Progress */
  .progress-wrap {
    margin-bottom: 24px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
  }
  .progress-bar {
    height: 6px; background: var(--lilac);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--purple2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    background: var(--white);
    border: 1px solid var(--lilac);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: 0 12px 48px var(--shadow);
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content:''; position:absolute; top:0;left:0;right:0;height:3px;
    background: linear-gradient(90deg, var(--purple), var(--brown), var(--purple));
  }

  .q-number {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--brown); margin-bottom: 12px;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 4vw, 22px);
    font-weight: 700; color: var(--text);
    line-height: 1.3; margin-bottom: 24px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    background: var(--bg);
    border: 1.5px solid var(--lilac);
    border-radius: 14px; padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }
  .option:hover {
    border-color: var(--purple);
    background: var(--soft);
    transform: translateX(4px);
  }
  .option.selected {
    border-color: var(--purple);
    background: var(--soft);
    box-shadow: 0 0 0 3px rgba(123,94,167,0.15);
  }
  .opt-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--lilac);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .option.selected .opt-dot {
    background: var(--purple); border-color: var(--purple);
  }
  .opt-dot::after {
    content: ''; width: 8px; height: 8px;
    border-radius: 50%; background: white;
    opacity: 0; transition: opacity 0.2s;
  }
  .option.selected .opt-dot::after { opacity: 1; }
  .opt-text { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }

  /* Next button */
  .btn-next {
    width: 100%; margin-top: 20px;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    color: white; border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 16px; border-radius: 14px;
    cursor: pointer; display: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(123,94,167,0.3);
  }
  .btn-next.visible { display: block; animation: fadeUp 0.3s ease both; }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(123,94,167,0.4); }

  /* RESULT */
  .result-card { display: none; }
  .result-card.show {
    display: block;
    animation: fadeUp 0.5s ease both;
  }
  .result-emoji { font-size: 52px; text-align: center; margin-bottom: 16px; }
  .result-level {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700;
    color: var(--purple); margin-bottom: 8px;
  }
  .result-level em { font-style: italic; color: var(--brown); }
  .result-desc {
    text-align: center; font-size: 15px;
    color: var(--muted); line-height: 1.7;
    margin-bottom: 24px; padding: 0 8px;
  }

  /* Score meter */
  .score-meter {
    background: var(--bg); border-radius: 14px;
    padding: 16px; margin-bottom: 20px;
  }
  .score-label {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 8px;
  }
  .score-bar {
    height: 10px; background: var(--lilac);
    border-radius: 5px; overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 1s ease;
  }

  /* Capture form */
  .capture-form { margin-bottom: 20px; }
  .capture-form label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .capture-form input {
    width: 100%; border: 1.5px solid var(--lilac);
    border-radius: 12px; padding: 13px 16px;
    font-family: 'Nunito', sans-serif; font-size: 14px;
    color: var(--text); background: var(--bg);
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  .capture-form input:focus { outline: none; border-color: var(--purple); background: var(--white); }

  /* CTA result */
  .result-cta {
    display: block; width: 100%; text-align: center;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    color: white; text-decoration: none;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    padding: 18px; border-radius: 14px;
    box-shadow: 0 8px 28px rgba(123,94,167,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    border: none; cursor: pointer;
  }
  .result-cta:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(123,94,167,0.45); }
  .result-guarantee { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes slideOut {
    to { opacity:0; transform:translateX(-30px); }
  }
</style>
</head>
<body>
<div class="quiz-container">

  <div class="quiz-header" id="quiz-header">
    <div class="brand">🧠 SOS Mente Acelerada</div>
    <h1>Qual é o nível da<br><em>sua ansiedade?</em></h1>
    <p>Responda 5 perguntas e descubra em 60 segundos</p>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-info">
      <span id="progress-text">Pergunta 1 de 5</span>
      <span id="progress-pct">20%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:20%"></div>
    </div>
  </div>

  <!-- QUIZ CARD -->
  <div class="card" id="quiz-card">
    <div class="q-number" id="q-number">Pergunta 1 de 5</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Próxima →</button>
  </div>

  <!-- RESULT CARD -->
  <div class="card result-card" id="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-level" id="result-level"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="score-meter">
      <div class="score-label">
        <span>Nível de sobrecarga mental</span>
        <span id="score-pct-label">0%</span>
      </div>
      <div class="score-bar">
        <div class="score-fill" id="score-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="capture-form">
      <label>Onde envio seu protocolo personalizado?</label>
      <input type="text" id="input-name" placeholder="Seu nome" />
      <input type="email" id="input-email" placeholder="Seu melhor e-mail" />
    </div>
    <button class="result-cta" onclick="goToSales()">
      🌿 Ver meu protocolo personalizado — R$27
    </button>
    <p class="result-guarantee">🔒 Acesso imediato · 7 dias de garantia</p>
  </div>

</div>

<script>
const questions = [
  {
    text: "Com que frequência você vai para a cama, mas sua mente continua acelerada?",
    options: [
      { text: "Raramente — costumo dormir bem", score: 1 },
      { text: "Às vezes, 1 ou 2 vezes por semana", score: 2 },
      { text: "Frequentemente, quase toda semana", score: 3 },
      { text: "Todo dia, é minha rotina normal", score: 4 }
    ]
  },
  {
    text: "Você se pega revisando situações do passado ou preocupado com o futuro?",
    options: [
      { text: "Não muito, consigo manter o foco no presente", score: 1 },
      { text: "Sim, mas consigo me distrair", score: 2 },
      { text: "Frequentemente e me sinto esgotado por isso", score: 3 },
      { text: "É constante, minha mente nunca descansa", score: 4 }
    ]
  },
  {
    text: "Como você se sente fisicamente quando está em situações de pressão?",
    options: [
      { text: "Tranquilo, lido bem com pressão", score: 1 },
      { text: "Sinto um leve desconforto, mas passa", score: 2 },
      { text: "Coração acelerado, tensão muscular, respiração curta", score: 3 },
      { text: "Crises físicas intensas — aperto no peito, formigamento", score: 4 }
    ]
  },
  {
    text: "Qual destas situações mais te identifica no dia a dia?",
    options: [
      { text: "Consigo relaxar com facilidade quando quero", score: 1 },
      { text: "Uso celular ou TV para desligar, mas não funciona 100%", score: 2 },
      { text: "Mesmo de folga, não consigo realmente descansar", score: 3 },
      { text: "Sinto culpa quando paro — parece que devo estar sempre fazendo algo", score: 4 }
    ]
  },
  {
    text: "Já tentou alguma técnica para controlar a ansiedade?",
    options: [
      { text: "Nunca precisei, meu nível é baixo", score: 1 },
      { text: "Tentei meditação ou respiração, mas desisti", score: 2 },
      { text: "Tentei várias coisas, nada funcionou de forma consistente", score: 3 },
      { text: "Estou em busca urgente de algo que realmente funcione", score: 4 }
    ]
  }
];

const results = [
  {
    min: 5, max: 8,
    emoji: "😌",
    level: "Mente <em>levemente</em> sobrecarregada",
    desc: "Sua mente está sob pressão leve, mas com os instrumentos certos você pode manter a leveza antes que se torne um problema maior. O protocolo SOS vai te dar ferramentas preventivas poderosas.",
    color: "#1D9E75",
    cta: "Ver meu protocolo preventivo"
  },
  {
    min: 9, max: 13,
    emoji: "😤",
    level: "Ansiedade <em>moderada</em> — atenção!",
    desc: "Você está no ponto de inflexão. Sua mente carrega mais do que deveria e isso já afeta seu sono e sua energia. O método de 10 minutos pode mudar isso hoje mesmo.",
    color: "#BA7517",
    cta: "Quero desacelerar minha mente"
  },
  {
    min: 14, max: 17,
    emoji: "🌀",
    level: "Sobrecarga <em>alta</em> — precisa agir agora",
    desc: "Sua mente está em modo de alerta quase constante. Isso esgota seu sistema nervoso e afeta tudo — sono, relacionamentos, produtividade. O protocolo SOS foi criado exatamente para esse nível.",
    color: "#D85A30",
    cta: "Preciso do protocolo urgente"
  },
  {
    min: 18, max: 20,
    emoji: "🆘",
    level: "Nível <em>crítico</em> — sua mente pede socorro",
    desc: "Você está carregando um peso mental enorme. Cada dia sem intervenção aumenta o esgotamento. O Kit Socorro Imediato foi desenvolvido para situações exatamente como a sua.",
    color: "#E24B4A",
    cta: "Preciso de ajuda agora — R$27"
  }
];

let current = 0;
let totalScore = 0;
let selectedScore = null;

function getResult(score) {
  return results.find(r => score >= r.min && score <= r.max) || results[results.length-1];
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-number').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-text').textContent = `Pergunta ${current+1} de ${questions.length}`;
  const pct = Math.round(((current+1)/questions.length)*100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="opt-dot"></div><div class="opt-text">${o.text}</div>`;
    div.onclick = () => selectOption(div, o.score);
    opts.appendChild(div);
  });

  selectedScore = null;
  document.getElementById('btn-next').classList.remove('visible');
}

function selectOption(el, score) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedScore = score;
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  if (selectedScore === null) return;
  totalScore += selectedScore;

  if (current < questions.length - 1) {
    current++;
    const card = document.getElementById('quiz-card');
    card.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => {
      card.style.animation = '';
      renderQuestion();
      card.style.animation = 'fadeUp 0.4s ease both';
    }, 280);
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-header').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'none';

  const r = getResult(totalScore);
  const pct = Math.round(((totalScore - 5) / 15) * 100);

  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-level').innerHTML = r.level;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('score-fill').style.background = r.color;

  const rc = document.getElementById('result-card');
  rc.classList.add('show');

  // Animate score bar
  setTimeout(() => {
    document.getElementById('score-fill').style.width = pct + '%';
    document.getElementById('score-pct-label').textContent = pct + '%';
  }, 300);

  // Store score for webhook
  window._quizScore = totalScore;
  window._quizResult = r.level.replace(/<[^>]*>/g, '');
}

function goToSales() {
  const name = document.getElementById('input-name').value;
  const email = document.getElementById('input-email').value;

  // Envia para n8n webhook se disponível
  if (name && email) {
    fetch('SEU_WEBHOOK_N8N_AQUI', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: name,
        email: email,
        score: window._quizScore,
        resultado: window._quizResult,
        timestamp: new Date().toISOString()
      })
    }).catch(() => {}); // Silent fail — não bloqueia o redirect
  }

  // Redirect para página de vendas
  window.location.href = 'https://solucoescotidianas.github.io/Paginadevendassosasiedade/';
}

// Init
renderQuestion();
</script>
</body>
</html>
